services:
  # ── Platform database ─────────────────────────────────────────────────
  # Console 自身的資料庫（Prisma / NextAuth 等）
  postgres:
    image: postgres:17-alpine
    container_name: aigo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aigo
      POSTGRES_PASSWORD: aigo_dev_password
      POSTGRES_DB: aigo
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Built-in PostgreSQL for orgs ──────────────────────────────────────
  # 提供給各 org 的 built-in PostgreSQL service，每個 org 使用獨立 database。
  builtin-postgres:
    image: postgres:17-alpine
    container_name: aigo-builtin-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: aigo_builtin
      POSTGRES_PASSWORD: aigo_builtin_password
      POSTGRES_DB: postgres
    volumes:
      - builtin_postgres_data:/var/lib/postgresql/data

  # ── Built-in disk storage for orgs ────────────────────────────────────
  # Each org gets /data/storage/<slug>. Apps access it via a shared volume.
  disk-storage:
    image: busybox:1.37
    container_name: aigo-disk-storage
    command: >
      sh -c "chmod 777 /data/storage && echo 'disk-storage volume ready' && tail -f /dev/null"
    restart: unless-stopped
    volumes:
      - disk_storage_data:/data/storage

  caddy:
    image: caddy:2-alpine
    container_name: aigo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  builtin_postgres_data:
  disk_storage_data:
  caddy_data:
  caddy_config:
