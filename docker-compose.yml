services:
  postgres:
    image: postgres:17-alpine
    container_name: aigo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aigo
      POSTGRES_PASSWORD: aigo_dev_password
      POSTGRES_DB: aigo
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2-alpine
    container_name: aigo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_local_certs:/data/caddy/pki
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_local_certs:
