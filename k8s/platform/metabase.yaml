---
# Built-in Metabase — Business Intelligence & Analytics Dashboard
# Multi-tenant: each org gets its own group/collection (org-<slug>)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: aigo-system
  labels:
    app: metabase
    aigo.dev/component: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:v0.51.6
          ports:
            - containerPort: 3000
          env:
            - name: MB_DB_TYPE
              value: "postgres"
            - name: MB_DB_DBNAME
              value: "metabase"
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_USER
              value: "supabase_admin"
            - name: MB_DB_PASS
              value: "supabase_dev_password"
            - name: MB_DB_HOST
              value: "supabase-db.aigo-system.svc.cluster.local"
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx1g"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: aigo-system
  labels:
    app: metabase
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: metabase
