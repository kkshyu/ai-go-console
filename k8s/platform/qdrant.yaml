---
# Built-in Qdrant — Vector Database
# Multi-tenant: each org gets its own collection prefix (org_<slug>_*)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: builtin-qdrant
  namespace: aigo-system
  labels:
    app: builtin-qdrant
    aigo.dev/component: qdrant
spec:
  serviceName: builtin-qdrant
  replicas: 1
  selector:
    matchLabels:
      app: builtin-qdrant
  template:
    metadata:
      labels:
        app: builtin-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.4
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: builtin-qdrant
  namespace: aigo-system
  labels:
    app: builtin-qdrant
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
  selector:
    app: builtin-qdrant
