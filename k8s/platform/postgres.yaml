---
# Platform PostgreSQL — Console 自身的資料庫（Prisma / NextAuth 等）
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: aigo-system
type: Opaque
stringData:
  POSTGRES_USER: aigo
  POSTGRES_PASSWORD: aigo_dev_password
  POSTGRES_DB: aigo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: aigo-system
  labels:
    app: postgres
    aigo.dev/component: platform-db
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - aigo
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - aigo
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aigo-system
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
# NodePort for external access (dev convenience — Next.js on host connects to DB)
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
  namespace: aigo-system
  labels:
    app: postgres
spec:
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
  selector:
    app: postgres
