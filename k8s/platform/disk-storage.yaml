---
# Shared disk storage PVC for app file storage
# 每個 org 使用 /data/storage/<slug> 目錄
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: disk-storage
  namespace: aigo-system
  labels:
    app: disk-storage
    aigo.dev/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
