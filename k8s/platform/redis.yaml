---
# Redis — Message queue for background actor workers (BullMQ)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: platform-redis
  namespace: aigo-system
  labels:
    app: platform-redis
    aigo.dev/component: message-queue
spec:
  serviceName: platform-redis
  replicas: 1
  selector:
    matchLabels:
      app: platform-redis
  template:
    metadata:
      labels:
        app: platform-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - noeviction
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: platform-redis
  namespace: aigo-system
  labels:
    app: platform-redis
spec:
  type: NodePort
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 30379
  selector:
    app: platform-redis
